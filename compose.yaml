services:
  app:
    build:
      context: .
      target: dev
    container_name: marketops-app
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      DATABASE_URL: postgresql://marketops:marketops@db:5432/marketops
    volumes:
      - .:/app
      - marketops_node_modules:/app/node_modules
      - marketops_next:/app/.next
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: marketops-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: marketops
      POSTGRES_USER: marketops
      POSTGRES_PASSWORD: marketops
    volumes:
      - marketops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketops -d marketops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  marketops_node_modules:
  marketops_next:
  marketops_postgres:
